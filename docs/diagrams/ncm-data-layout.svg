<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">NCM data layout</title>
  <desc id="desc">A diagram showing the structure of an NCM text record and how it maps into palette entries and cuboid box records.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d13"/>
      <stop offset="1" stop-color="#12180f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".38"/>
    </filter>
    <style>
      .label { font: 800 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #90ff1a; letter-spacing: .16em; }
      .title { font: 850 44px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f3f8ff; }
      .copy { font: 500 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #b8c7d4; }
      .head { font: 800 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f3f8ff; }
      .mono { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f7d98f; }
      .small { font: 600 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #aebdca; }
      .card { fill: rgba(255,255,255,.06); stroke: rgba(255,255,255,.16); stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .slot { stroke: rgba(255,255,255,.18); stroke-width: 1; rx: 10; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1040" cy="146" r="260" fill="#83ff00" opacity=".08"/>
  <circle cx="206" cy="612" r="260" fill="#00c2ff" opacity=".08"/>

  <text x="72" y="78" class="label">NCM2 RECORD</text>
  <text x="72" y="132" class="title">A compact model is a list of colored cuboids.</text>
  <text x="72" y="168" class="copy">The payload stays readable enough for debugging while remaining small enough for program state and RPC transport experiments.</text>

  <g transform="translate(72 232)">
    <rect class="card" width="1136" height="136"/>
    <text x="28" y="42" class="head">Text record</text>
    <rect class="slot" x="28" y="70" width="116" height="38" fill="#14251b"/>
    <text x="48" y="95" class="mono">NCM2:</text>
    <rect class="slot" x="158" y="70" width="178" height="38" fill="#102236"/>
    <text x="182" y="95" class="mono">palette</text>
    <rect class="slot" x="350" y="70" width="138" height="38" fill="#2a1f0f"/>
    <text x="374" y="95" class="mono">count</text>
    <rect class="slot" x="502" y="70" width="336" height="38" fill="#151c2d"/>
    <text x="526" y="95" class="mono">box stream</text>
    <rect class="slot" x="852" y="70" width="220" height="38" fill="#18251f"/>
    <text x="876" y="95" class="mono">checksum ready</text>
  </g>

  <g transform="translate(72 418)">
    <rect class="card" width="350" height="210"/>
    <text x="28" y="42" class="head">Palette</text>
    <text x="28" y="72" class="small">Color table shared by all cuboids.</text>
    <g transform="translate(28 104)">
      <rect width="42" height="42" rx="8" fill="#7cff00"/>
      <rect x="54" width="42" height="42" rx="8" fill="#19c8ff"/>
      <rect x="108" width="42" height="42" rx="8" fill="#f1c45b"/>
      <rect x="162" width="42" height="42" rx="8" fill="#f26d6d"/>
      <rect x="216" width="42" height="42" rx="8" fill="#d9f2ff"/>
    </g>
    <text x="28" y="178" class="mono">0:#7cff00  1:#19c8ff</text>
  </g>

  <g transform="translate(464 418)">
    <rect class="card" width="350" height="210"/>
    <text x="28" y="42" class="head">Cuboid record</text>
    <text x="28" y="72" class="small">Signed position plus dimensions and color index.</text>
    <text x="28" y="116" class="mono">x, y, z</text>
    <text x="28" y="146" class="mono">w, h, d</text>
    <text x="28" y="176" class="mono">paletteIndex</text>
    <g transform="translate(214 92)">
      <path d="M0 30 L58 8 L126 34 L66 62 Z" fill="#19c8ff" opacity=".82"/>
      <path d="M0 30 L66 62 V118 L0 84 Z" fill="#0f80c7"/>
      <path d="M66 62 L126 34 V88 L66 118 Z" fill="#095c8e"/>
      <path d="M0 30 L58 8 L126 34 L66 62 Z" fill="none" stroke="#d9f2ff"/>
    </g>
  </g>

  <g transform="translate(856 418)">
    <rect class="card" width="350" height="210"/>
    <text x="28" y="42" class="head">Runtime use</text>
    <text x="28" y="76" class="small">1. Decode text into boxes.</text>
    <text x="28" y="106" class="small">2. Build cuboid geometry.</text>
    <text x="28" y="136" class="small">3. Apply palette colors.</text>
    <text x="28" y="166" class="small">4. Render or verify.</text>
    <rect x="222" y="74" width="78" height="78" rx="12" fill="#0b131c" stroke="#314b5d"/>
    <rect x="242" y="94" width="38" height="38" fill="#7cff00"/>
    <rect x="260" y="74" width="38" height="20" fill="#19c8ff"/>
    <rect x="280" y="114" width="20" height="38" fill="#f1c45b"/>
  </g>

  <path d="M226 368 C226 394 246 408 292 418" stroke="#7fdcff" stroke-width="3" fill="none"/>
  <path d="M666 368 C666 394 650 408 636 418" stroke="#7fdcff" stroke-width="3" fill="none"/>
  <path d="M964 368 C964 394 1010 408 1032 418" stroke="#7fdcff" stroke-width="3" fill="none"/>
</svg>
