<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Cuboid merge optimizer</title>
  <desc id="desc">A diagram showing how voxel cells with shared palette values are merged into fewer cuboids before NCM encoding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071018"/><stop offset="1" stop-color="#11170f"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#7fdcff"/></marker>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 42px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f1f7ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#aebdca}.card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.17);stroke-width:1.2;rx:18}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f2f7fb}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}.line{stroke:#7fdcff;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1040" cy="116" r="250" fill="#83ff00" opacity=".08"/><circle cx="230" cy="610" r="270" fill="#00c2ff" opacity=".08"/>
  <text x="70" y="78" class="label">NCM OPTIMIZATION</text>
  <text x="70" y="132" class="title">The merge pass trades cells for boxes.</text>
  <text x="70" y="168" class="copy">NCM stays useful because same-color voxel runs become larger cuboids before the text record is emitted.</text>
  <g transform="translate(84 248)"><rect class="card" width="230" height="238"/><text x="24" y="42" class="head">Voxel cells</text><text x="24" y="78" class="small">positioned unit cubes</text><text x="24" y="108" class="small">palette index per cell</text><g transform="translate(42 142)"><rect width="28" height="28" fill="#7cff00"/><rect x="32" width="28" height="28" fill="#7cff00"/><rect x="64" width="28" height="28" fill="#1cc8ff"/><rect y="32" width="28" height="28" fill="#7cff00"/><rect x="32" y="32" width="28" height="28" fill="#7cff00"/><rect x="64" y="32" width="28" height="28" fill="#1cc8ff"/></g></g>
  <path class="line" d="M314 366 H378"/>
  <g transform="translate(400 218)"><rect class="card" width="250" height="298"/><text x="24" y="42" class="head">Merge search</text><text x="24" y="80" class="small">scan unclaimed cells</text><text x="24" y="110" class="small">grow along axes</text><text x="24" y="140" class="small">stop at color change</text><text x="24" y="170" class="small">mark cells claimed</text><text x="24" y="214" class="mono">mode = merge</text><text x="24" y="244" class="mono">targetHeight</text></g>
  <path class="line" d="M650 366 H714"/>
  <g transform="translate(736 248)"><rect class="card" width="214" height="238"/><text x="24" y="42" class="head">Cuboids</text><text x="24" y="78" class="small">x, y, z</text><text x="24" y="108" class="small">width, height, depth</text><text x="24" y="138" class="small">palette index</text><rect x="44" y="174" width="104" height="44" fill="#7cff00" opacity=".9"/><rect x="150" y="174" width="34" height="44" fill="#1cc8ff" opacity=".9"/></g>
  <path class="line" d="M950 366 H1014"/>
  <g transform="translate(1036 248)"><rect class="card" width="174" height="238"/><text x="24" y="42" class="head">NCM2 text</text><text x="24" y="78" class="small">prefix</text><text x="24" y="108" class="small">palette</text><text x="24" y="138" class="small">box stream</text><text x="24" y="180" class="mono">fewer records</text></g>
  <text x="302" y="630" class="copy">The optimization is format-level compression: it keeps authored shape, but removes redundant per-voxel storage.</text>
</svg>
